<mat-card class="max-w-md mx-auto mt-10">
  <mat-card-header>
    <mat-card-title i18n>Update Password</mat-card-title>
  </mat-card-header>
  <mat-card-content>
    <form [formGroup]="form" (ngSubmit)="updatePassword()">
      <mat-form-field appearance="fill" class="w-full">
        <mat-label i18n>Current Password</mat-label>
        <input matInput type="password" formControlName="currentPassword" required />
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full">
        <mat-label i18n>New Password</mat-label>
        <input matInput type="password" formControlName="newPassword" required />
      </mat-form-field>

      <mat-form-field appearance="fill" class="w-full">
        <mat-label i18n>Confirm New Password</mat-label>
        <input matInput type="password" formControlName="confirmPassword" required />
      </mat-form-field>

      <button mat-raised-button color="primary" type="submit" [disabled]="loading" class="w-full">
        @if (loading) {
          <span i18n>Updating...</span>
        } @else {
          <span i18n>Update Password</span>
        }
      </button>

      @if (message) {
        <div class="text-green-600 mt-2">{{ message }}</div>
      }
      @if (error) {
        <div class="text-red-600 mt-2">{{ error }}</div>
      }
    </form>
  </mat-card-content>
</mat-card>
