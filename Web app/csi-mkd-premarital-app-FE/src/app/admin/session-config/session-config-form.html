<h2 mat-dialog-title>{{ isEdit() ? "Edit" : "Add" }} Session</h2>

<mat-dialog-content [formGroup]="form">
  <mat-form-field appearance="fill" class="w-full">
    <mat-label i18n>Session Name</mat-label>
    <input matInput formControlName="sessionName" />
  </mat-form-field>

  <mat-form-field appearance="fill" class="w-full">
    <mat-label i18n>Start Date</mat-label>
    <input matInput readonly [matDatepicker]="startPicker" formControlName="startDate" (click)="startPicker.open()" />
    <mat-datepicker-toggle matSuffix [for]="startPicker" />
    <mat-datepicker #startPicker></mat-datepicker>
  </mat-form-field>

  <mat-form-field appearance="fill" class="w-full">
    <mat-label i18n>End Date</mat-label>
    <input matInput readonly [matDatepicker]="endPicker" formControlName="endDate" (click)="endPicker.open()" />
    <mat-datepicker-toggle matSuffix [for]="endPicker" />
    <mat-datepicker #endPicker></mat-datepicker>
  </mat-form-field>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button type="button" (click)="close()" i18n>Cancel</button>
  <button mat-raised-button color="primary" type="button" [disabled]="form.invalid" (click)="onSubmit()">
    {{ isEdit() ? "Update" : "Create" }}
  </button>
</mat-dialog-actions>
