<h3 class="text-2xl font-bold mb-6 text-rose-900">Session Configuration</h3>

<button mat-raised-button color="primary" (click)="openModal()" class="mb-6">Add Session</button>

<div class="overflow-x-auto rounded-lg shadow">
  <table mat-table [dataSource]="sessionList()" class="min-w-full bg-white">
    <ng-container matColumnDef="sessionName">
      <th mat-header-cell *matHeaderCellDef>Session</th>
      <td mat-cell *matCellDef="let session">{{ session.sessionName }}</td>
    </ng-container>

    <ng-container matColumnDef="startDate">
      <th mat-header-cell *matHeaderCellDef>Start Date</th>
      <td mat-cell *matCellDef="let session">{{ session.startDate | date : "shortDate" }}</td>
    </ng-container>

    <ng-container matColumnDef="endDate">
      <th mat-header-cell *matHeaderCellDef>End Date</th>
      <td mat-cell *matCellDef="let session">{{ session.endDate | date : "shortDate" }}</td>
    </ng-container>

    <ng-container matColumnDef="isActive">
      <th mat-header-cell *matHeaderCellDef>Status</th>
      <td mat-cell *matCellDef="let session">
        <span [class.text-green-600]="session.isActive" [class.text-gray-500]="!session.isActive">
          {{ session.isActive ? "Active" : "Inactive" }}
        </span>
      </td>
    </ng-container>

    <ng-container matColumnDef="actions">
      <th mat-header-cell *matHeaderCellDef>Actions</th>
      <td mat-cell *matCellDef="let session">
        <button mat-icon-button color="primary" (click)="editSession(session)">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteSession(session)">
          <mat-icon>delete</mat-icon>
        </button>
        <button mat-icon-button [color]="session.isActive ? 'accent' : 'primary'" (click)="toggleStatus(session)">
          <mat-icon>{{ session.isActive ? "toggle_off" : "toggle_on" }}</mat-icon>
        </button>
      </td>
    </ng-container>

    <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
    <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
  </table>
</div>
