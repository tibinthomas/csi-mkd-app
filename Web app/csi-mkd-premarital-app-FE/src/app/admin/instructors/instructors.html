<div class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <mat-card class="rounded-2xl shadow-xl">
    <mat-card-header class="!pb-4 border-b">
      <mat-card-title>
        <h1 class="text-2xl font-bold text-on-surface theme-transition" i18n>Instructors Management</h1>
      </mat-card-title>
    </mat-card-header>
    <mat-card-content class="pt-6">
      <div class="flex justify-between items-center mb-6">
        <h2 class="text-lg font-semibold text-on-surface theme-transition" i18n>
          Instructors ({{ instructors().length }})
        </h2>
        <button mat-flat-button color="primary" (click)="addInstructor()">
          <mat-icon>add</mat-icon>
          <span i18n>Add Instructor</span>
        </button>
      </div>

      @if(isLoading()) {
      <div class="flex justify-center items-center p-8">
        <mat-spinner diameter="50" color="primary"></mat-spinner>
      </div>
      } @else if(error()) {
      <div class="text-center text-red-600 p-8">
        <p>{{ error() }}</p>
        <button mat-button color="primary" (click)="loadInstructors()" class="mt-4">
          <mat-icon>refresh</mat-icon>
          <span i18n>Retry</span>
        </button>
      </div>
      } @else if(instructors().length > 0) {
      <div class="overflow-x-auto">
        <table mat-table [dataSource]="sortedInstructors()" class="w-full surface-container theme-transition">
          <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef class="font-semibold" i18n>Name</th>
            <td mat-cell *matCellDef="let instructor" class="font-medium">{{ instructor.Name }}</td>
          </ng-container>

          <ng-container matColumnDef="qualification">
            <th mat-header-cell *matHeaderCellDef class="font-semibold" i18n>Qualification</th>
            <td mat-cell *matCellDef="let instructor">{{ instructor.Qualification }}</td>
          </ng-container>

          <ng-container matColumnDef="actions">
            <th mat-header-cell *matHeaderCellDef class="font-semibold" i18n>Actions</th>
            <td mat-cell *matCellDef="let instructor">
              <div class="flex gap-2">
                <button
                  mat-icon-button
                  (click)="editInstructor(instructor)"
                  matTooltip="Edit Instructor"
                  color="primary"
                >
                  <mat-icon>edit</mat-icon>
                </button>
                <button
                  mat-icon-button
                  (click)="deleteInstructor(instructor)"
                  matTooltip="Delete Instructor"
                  color="warn"
                >
                  <mat-icon>delete</mat-icon>
                </button>
              </div>
            </td>
          </ng-container>

          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns"></tr>
        </table>
      </div>
      } @else {
      <div class="text-center text-on-surface-variant p-8 theme-transition">
        <mat-icon class="text-6xl mb-4 text-on-surface-variant">person_outline</mat-icon>
        <p class="text-lg mb-4" i18n>No instructors found</p>
        <button mat-flat-button color="primary" (click)="addInstructor()">
          <mat-icon>add</mat-icon>
          <span i18n>Add First Instructor</span>
        </button>
      </div>
      }
    </mat-card-content>
  </mat-card>
</div>
