<div class="container mx-auto px-4 sm:px-6 lg:px-8 py-8">
  <h1 class="text-3xl font-bold text-on-surface mb-6 theme-transition" i18n>Welcome back, Admin!</h1>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
    <!-- Card: Premarital Registrations -->
    <mat-card class="rounded-xl shadow-lg hover:shadow-xl transition-shadow duration-300">
      <mat-card-content class="flex items-center p-6">
        <mat-icon class="text-rose-500 text-4xl mr-6">people</mat-icon>
        <div>
          <p class="text-on-surface-variant theme-transition" i18n>Premarital Registrations</p>
          <p class="text-3xl font-bold text-on-surface theme-transition">{{ premaritalCount() }}</p>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Card: General Registrations -->
    <mat-card class="rounded-xl shadow-lg hover:shadow-xl transition-shadow duration-300">
      <mat-card-content class="flex items-center p-6">
        <mat-icon class="text-blue-500 text-4xl mr-6">list_alt</mat-icon>
        <div>
          <p class="text-on-surface-variant theme-transition" i18n>General Registrations</p>
          <p class="text-3xl font-bold text-on-surface theme-transition">{{ generalCount() }}</p>
        </div>
      </mat-card-content>
    </mat-card>

    <!-- Card: Pre-confirmational Registrations -->
    <mat-card class="rounded-xl shadow-lg hover:shadow-xl transition-shadow duration-300">
      <mat-card-content class="flex items-center p-6">
        <mat-icon class="text-green-500 text-4xl mr-6">check_circle</mat-icon>
        <div>
          <p class="text-on-surface-variant theme-transition" i18n>Pre-confirmational Registrations</p>
          <p class="text-3xl font-bold text-on-surface theme-transition">{{ confirmationCount() }}</p>
        </div>
      </mat-card-content>
    </mat-card>
  </div>
</div>
