<div class="px-4 sm:px-6 lg:px-8">
  <h3 class="text-3xl sm:text-4xl font-extrabold mb-6 sm:mb-8 drop-shadow-md tracking-tight" i18n>Welcome back, Admin!</h3>

  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-6">
    <!-- Card: Premarital Registrations -->
    <mat-card>
      <mat-card-header>
        <mat-card-title i18n>Premarital Registrations</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p class="text-4xl font-extrabold">{{ premaritalCount() }}</p>
      </mat-card-content>
    </mat-card>

    <!-- Card: General Registrations -->
    <mat-card>
      <mat-card-header>
        <mat-card-title i18n>General Registrations</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p class="text-4xl font-extrabold">{{ generalCount() }}</p>
      </mat-card-content>
    </mat-card>

    <!-- Card: Pre-confirmational Registrations -->
    <mat-card>
      <mat-card-header>
        <mat-card-title i18n>Pre-confirmational Registrations</mat-card-title>
      </mat-card-header>
      <mat-card-content>
        <p class="text-4xl font-extrabold">{{ confirmationCount() }}</p>
      </mat-card-content>
    </mat-card>
  </div>
</div>
