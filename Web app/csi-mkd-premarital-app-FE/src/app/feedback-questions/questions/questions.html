<section class="py-30 px-4" role="main" aria-labelledby="questions-title">
  <mat-card class="max-w-4xl mx-auto p-6">
    <mat-card-header class="mb-6">
      <mat-card-title id="questions-title" class="!font-bold" i18n>
        Premarital Counselling Questions Form
      </mat-card-title>
    </mat-card-header>

    <mat-card-content>
      <form [formGroup]="form" (ngSubmit)="onSubmit()" aria-labelledby="questions-title" novalidate>
        <!-- Static Basic Info -->
        <div class="grid md:grid-cols-2 gap-6 pb-10">
          <div class="w-full">
            <label class="font-medium" i18n>Name : {{ userDetails.name }}</label>
          </div>

          <div class="w-full">
            <label class="font-medium" i18n>Email: {{ userDetails.email }}</label>
          </div>
        </div>

        <!-- Questions -->
        @for (q of questions; track q.controlName; let i = $index) {
        <div class="mb-4">
          <label class="font-medium block mb-1 whitespace-normal"> {{ i + 1 }}. {{ q.label }} </label>
          <mat-form-field appearance="fill" class="w-full">
            <textarea
              matInput
              [formControlName]="q.controlName"
              rows="4"
              class="w-full min-h-[80px] resize-none p-2 border rounded"
              aria-required="true"
            ></textarea>
          </mat-form-field>
        </div>
        }

        <div class="pt-6 flex justify-center">
          <button
            mat-flat-button
            color="primary"
            type="submit"
            [disabled]="form.invalid || isSubmitting()"
            [attr.aria-describedby]="isSubmitting() ? 'submit-status' : null"
          >
            {{ isSubmitting() ? "Submitting..." : "Submit" }}
          </button>
          @if (isSubmitting()) {
          <div id="submit-status" class="sr-only" aria-live="polite" i18n>Submitting your responses, please wait</div>
          }
        </div>

        @if (successMessage()) {
        <div class="mt-4 p-4 bg-green-100 text-green-800 rounded-lg" role="status" aria-live="polite">
          {{ successMessage() }}
        </div>
        } @if (errorMessage()) {
        <div class="mt-4 p-4 bg-red-100 text-red-800 rounded-lg" role="alert" aria-live="assertive">
          {{ errorMessage() }}
        </div>
        }
      </form>
    </mat-card-content>
  </mat-card>
</section>
