<main class="min-h-screen py-30 px-6 theme-transition">
  <div class="max-w-4xl mx-auto text-center">
    <h1 class="mb-5 text-2xl font-bold tracking-tight font-bold text-on-background theme-transition" i18n>
      Choose a Form
    </h1>
    <p class="text-on-surface-variant max-w-xl mx-auto mb-10 theme-transition" i18n>
      Select the form you'd like to fill out.
    </p>

    <div class="grid grid-cols-1 gap-10 md:grid-cols-2">
      <!-- Feedback Form Card -->
      <div
        class="elegant-card elegant-hover-effect cursor-pointer rounded-2xl shadow-md hover:shadow-2xl transition-all duration-300 hover:scale-[1.05] flex flex-col h-full focus:outline-none focus:ring-2 focus:ring-rose-500 dark:focus:ring-primary p-6 theme-transition"
        (click)="goToForm('feedback')"
        role="button"
        tabindex="0"
        aria-label="Open Feedback Form"
      >
        <!-- Feedback Icon -->
        <svg
          class="w-10 h-10 mb-4 text-rose-500"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M7 8h10M7 12h6m-3 8a9 9 0 1 1 4.546-16.764L19 8v7a2 2 0 0 1-2 2H8l-3 3v-3z"
          ></path>
        </svg>
        <h2 class="text-xl font-semibold font-bold mb-2" i18n>Feedback Form</h2>
        <p class="text-on-surface-variant text-sm mt-auto" i18n>Share your experience and suggestions.</p>
      </div>

      <!-- Questionnaire Form Card -->
      <div
        class="elegant-card elegant-hover-effect cursor-pointer rounded-2xl shadow-md hover:shadow-2xl transition-all duration-300 hover:scale-[1.05] flex flex-col h-full focus:outline-none focus:ring-2 focus:ring-rose-500 dark:focus:ring-primary p-6 theme-transition"
        (click)="goToForm('questions')"
        role="button"
        tabindex="0"
        aria-label="Open Questionnaire Form"
      >
        <!-- Checklist Icon -->
        <svg
          class="w-10 h-10 mb-4 text-rose-500"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          viewBox="0 0 24 24"
          xmlns="http://www.w3.org/2000/svg"
          aria-hidden="true"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M9 12l2 2 4-4M7 4h10a2 2 0 0 1 2 2v12a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"
          ></path>
        </svg>
        <h2 class="text-xl font-semibold font-bold mb-2" i18n>Questionnaire Form</h2>
        <p class="text-on-surface-variant text-sm mt-auto" i18n>
          Share your thoughts and opinions to help us understand participants better.
        </p>
      </div>
    </div>
  </div>
</main>
