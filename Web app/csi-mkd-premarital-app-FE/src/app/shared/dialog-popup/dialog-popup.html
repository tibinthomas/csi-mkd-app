<h2 mat-dialog-title class="pt-serif-bold">
  {{ data.title || "Success" }}
</h2>

<mat-dialog-content class="!text-sm text-on-surface pt-serif-regular">
  @for(message of data.messages; track message){
  <p>{{ message }}</p>

  } @if(data.extraMessage){
  <p>{{ data.extraMessage }}</p>

  }
</mat-dialog-content>

<mat-dialog-actions [class.!justify-between]="data.calendarEvent" align="end">
  @if (data.calendarEvent) {
  <button mat-stroked-button [matMenuTriggerFor]="calendarMenu" class="pt-serif-bold">
    <mat-icon>event</mat-icon>
    <span i18n>Add to Calendar</span>
  </button>
  <mat-menu #calendarMenu="matMenu">
    <button mat-menu-item (click)="addToGoogleCalendar()">
      <mat-icon>calendar_today</mat-icon>
      <span i18n>Google Calendar</span>
    </button>
    <button mat-menu-item (click)="downloadIcs()">
      <mat-icon>download</mat-icon>
      <span i18n>Download .ics file</span>
    </button>
  </mat-menu>
  }
  <button mat-flat-button mat-dialog-close class="pt-serif-bold" i18n>OK</button>
</mat-dialog-actions>
