<mat-sidenav-container class="h-screen cx-admin-canvas theme-transition">
  <mat-sidenav
    #sidenav
    [mode]="sidenavMode()"
    [opened]="sidenavOpened()"
    (openedChange)="sidenavOpen.set($event)"
    class="cx-admin-sidenav theme-transition"
    style="width: fit-content !important;"
  >
    <div class="cx-admin-brand p-5 text-center border-b border-outline/30">
      <h2 class="text-2xl font-extrabold tracking-tight theme-transition">CSI Admin</h2>
    </div>

    <mat-nav-list class="flex flex-col justify-between flex-1 !py-3">
      <div>
        @for (item of navigationItems; track item.routerLink) {
        <a
          mat-list-item
          [routerLink]="item.routerLink"
          routerLinkActive="cx-admin-nav-item--active"
          class="cx-admin-nav-item"
          (click)="onNavItemClick()"
        >
          <mat-icon class="mr-4">{{ item.icon }}</mat-icon>
          <span>{{ item.label }}</span>
        </a>
        }
      </div>

      <div class="p-4 border-t border-outline/30">
        <button mat-flat-button color="primary" class="w-full" (click)="onLogout()">
          <mat-icon class="mr-2">exit_to_app</mat-icon>
          <span>Logout</span>
        </button>
      </div>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="cx-admin-toolbar fixed top-0 left-0 right-0 z-50 theme-transition">
      <button mat-icon-button (click)="toggleSidenav()">
        <mat-icon>{{ menuIcon() }}</mat-icon>
      </button>
      <h1 class="text-xl font-semibold text-on-surface ml-4 theme-transition">Admin Panel</h1>
      <span class="flex-auto"></span>
      <app-theme-toggle></app-theme-toggle>
      <app-language-selector></app-language-selector>
    </mat-toolbar>
    <main class="py-20 cx-admin-canvas theme-transition">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
