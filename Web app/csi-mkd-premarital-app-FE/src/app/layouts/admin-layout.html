<mat-sidenav-container class="h-screen surface-container theme-transition">
  <mat-sidenav
    #sidenav
    [mode]="isMobile() ? 'over' : 'side'"
    [opened]="!isMobile() || sidenavOpen()"
    (openedChange)="sidenavOpen.set($event)"
    class="flex flex-col h-full w-52 md:w-56 lg:w-60 xl:w-64 border-r border-outline surface-container-high theme-transition"
  >
    <div class="p-4 text-center border-b border-outline">
      <h2 class="text-2xl font-bold text-primary theme-transition">CSI Admin</h2>
    </div>

    <mat-nav-list class="flex flex-col justify-between flex-1">
      <!-- Top links -->
      <div>
        <a
          mat-list-item
          routerLink="/admin/dashboard"
          routerLinkActive="!bg-primary-container !text-on-primary-container !border-2 !border-primary !rounded-lg"
        >
          <mat-icon class="mr-4">dashboard</mat-icon>
          <span>Dashboard</span>
        </a>
        <a
          mat-list-item
          routerLink="/admin/premarital"
          routerLinkActive="!bg-primary-container !text-on-primary-container !border-2 !border-primary !rounded-lg"
          (click)="toggleSidenav()"
        >
          <mat-icon class="mr-4">people</mat-icon>
          <span>Premarital Register List</span>
        </a>
        <a
          mat-list-item
          routerLink="/admin/session-config"
          routerLinkActive="!bg-primary-container !text-on-primary-container !border-2 !border-primary !rounded-lg"
          (click)="toggleSidenav()"
        >
          <mat-icon class="mr-4">event</mat-icon>
          <span>Premarital Session Config</span>
        </a>
        <a
          mat-list-item
          routerLink="/admin/deactivate-sessions"
          routerLinkActive="!bg-primary-container !text-on-primary-container !border-2 !border-primary !rounded-lg"
          (click)="toggleSidenav()"
        >
          <mat-icon class="mr-4">disabled_by_default</mat-icon>
          <span>Deactivate Sessions</span>
        </a>
        <a
          mat-list-item
          routerLink="/admin/general-list"
          routerLinkActive="!bg-primary-container !text-on-primary-container !border-2 !border-primary !rounded-lg"
          (click)="toggleSidenav()"
        >
          <mat-icon class="mr-4">list_alt</mat-icon>
          <span>General Register List</span>
        </a>
        <a
          mat-list-item
          routerLink="/admin/pre-confirm-list"
          routerLinkActive="!bg-primary-container !text-on-primary-container !border-2 !border-primary !rounded-lg"
          (click)="toggleSidenav()"
        >
          <mat-icon class="mr-4">check_circle</mat-icon>
          <span>Pre-Confirm List</span>
        </a>
      </div>

      <!-- Logout at the bottom -->
      <div class="p-4 border-t border-outline">
        <button mat-stroked-button class="w-full" routerLink="/admin/login">
          <mat-icon class="mr-2">exit_to_app</mat-icon>
          <span>Logout</span>
        </button>
      </div>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar class="surface-container-high shadow-sm theme-transition">
      <button mat-icon-button (click)="toggleSidenav()">
        <mat-icon>{{ sidenavOpen() ? "close" : "menu" }}</mat-icon>
      </button>
      <h1 class="text-xl font-semibold text-on-surface ml-4 theme-transition">Admin Panel</h1>
      <span class="flex-auto"></span>
      <app-theme-toggle></app-theme-toggle>
      <app-language-selector></app-language-selector>
    </mat-toolbar>
    <main class="p-6 surface-container theme-transition">
      <router-outlet></router-outlet>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
