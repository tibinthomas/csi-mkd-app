<header role="banner">
  <mat-toolbar
    color="primary"
    class="fixed top-0 left-0 right-0 z-50 flex justify-between items-center px-4 py-5 shadow-md backdrop-blur-sm bg-opacity-90"
  >
    <!-- Left: CSI Logo -->
    <div class="flex items-center space-x-2 transition-transform duration-300 hover:scale-105 cursor-pointer">
      <img
        src="assets/csi-logo.png"
        alt="CSI Church of South India Logo"
        class="h-10 sm:h-12 xl:h-15 w-auto aspect-[3/2] max-w-[96px] object-contain"
        role="img"
        routerLink="/about"
      />
    </div>

    <!-- Center: Title -->
    <div class="flex-1 text-center hover:scale-101 sm:block cursor-pointer" routerLink="/about">
      <h1
        class="!text-sm sm:!text-xl lg:!text-lg xl:!text-2xl uppercase tracking-wide transition-opacity duration-500 pt-serif-bold"
        i18n
      >
        CSI Counselling Centre
      </h1>
      <h2
        class="!text-xs sm:!text-xs xl:!text-sm uppercase tracking-wide transition-all duration-500 pt-serif-regular"
        i18n
      >
        Madhya Kerala Diocese
      </h2>
    </div>

    <!-- Right: Nav + Logos + Language + Menu -->
    <div class="flex items-center space-x-4">
      <!-- Desktop Nav Links -->
      <nav class="hidden lg:flex space-x-4" role="navigation" aria-label="Main navigation">
        <a
          mat-button
          routerLink="/about"
          routerLinkActive="active-link"
          class="hover:underline hover:scale-105 transition-all duration-300 pt-serif-bold"
          i18n
          aria-label="About us page"
          >About</a
        >
        <a
          mat-button
          routerLink="/team-members"
          routerLinkActive="active-link"
          class="hover:underline hover:scale-105 transition-all duration-300 pt-serif-bold"
          i18n
          aria-label="Our team members page"
          >Our Team</a
        >
        <a
          mat-button
          routerLink="/register"
          routerLinkActive="active-link"
          class="hover:underline hover:scale-105 transition-all duration-300 pt-serif-bold"
          i18n
          aria-label="Registration page"
          >Register</a
        >
        <a
          mat-button
          routerLink="/feedback"
          routerLinkActive="active-link"
          class="hover:underline hover:scale-105 transition-all duration-300 pt-serif-bold"
          i18n
          aria-label="Feedback page"
          >Feedback</a
        >
        <a
          mat-button
          routerLink="/sessions"
          routerLinkActive="active-link"
          class="hover:underline hover:scale-105 transition-all duration-300 pt-serif-bold"
          i18n
          aria-label="Sessions page"
          >Premarital Sessions</a
        >
      </nav>

      <!-- Language Selector -->
      <app-language-selector></app-language-selector>

      <!-- Mobile Hamburger -->
      <button
        [matMenuTriggerFor]="menu"
        class="lg:hidden active:animate-bounce"
        aria-label="Open navigation menu"
        aria-expanded="false"
        aria-haspopup="true"
      >
        <mat-icon aria-hidden="true">menu</mat-icon>
      </button>

      <!-- Right Logo -->
      <!-- <img
        src="assets/csi-mkd-logo.png"
        alt="CSI Madhya Kerala Diocese Logo"
        class="h-10 sm:h-12 xl:h-15 w-auto aspect-[3/2] max-w-[96px] object-contain transition-transform duration-300 hover:scale-105 cursor-pointer"
        role="img"
        routerLink="/about"
      /> -->
    </div>
  </mat-toolbar>
</header>

<!-- Mobile Nav Menu -->
<mat-menu #menu="matMenu" role="menu" aria-label="Mobile navigation menu">
  <a mat-menu-item routerLink="/about" routerLinkActive="active-link" i18n role="menuitem" aria-label="About us page"
    >About</a
  >
  <a
    mat-menu-item
    routerLink="/team-members"
    routerLinkActive="active-link"
    i18n
    role="menuitem"
    aria-label="Our team members page"
    >Our Team</a
  >
  <a
    mat-menu-item
    routerLink="/register"
    routerLinkActive="active-link"
    i18n
    role="menuitem"
    aria-label="Registration page"
    >Register</a
  >
  <a mat-menu-item routerLink="/feedback" routerLinkActive="active-link" i18n role="menuitem" aria-label="Feedback page"
    >Feedback</a
  >
  <a mat-menu-item routerLink="/sessions" routerLinkActive="active-link" i18n role="menuitem" aria-label="Sessions page"
    >Premarital Sessions</a
  >
</mat-menu>

<main role="main">
  <router-outlet></router-outlet>
</main>
<footer class="bg-rose-50 py-4 mt-6">
  <div class="container px-5 text-center">
    <p class="text-xs">&copy; {{ currentYear }} CSI Counselling Centre, Madhya Kerala Diocese. All rights reserved.</p>
    <p class="text-xs mt-2">
      Developed by
      <a href=" " class="text-blue-400 hover:underline" target="_blank" rel="noopener noreferrer">HomeStack team</a>
    </p>
  </div>
</footer>
