<mat-toolbar color="primary" class="flex flex-wrap justify-between items-center px-4 py-3">
  <!-- Left: Logo -->
  <div class="flex items-center space-x-2">
    <img src="assets/csi-logo.png" alt="CSI Logo" class="h-10 sm:h-16 w-auto" />
  </div>

  <!-- Center: Title -->
  <div class="flex-1 text-center sm:block">
    <h1 class="!text-sm sm:!text-2xl font-bold uppercase tracking-wide">CSI Counselling Centre</h1>
    <h2 class="!text-xs sm:!text-sm uppercase tracking-wide">Madhya Kerala Diocese</h2>
  </div>

  <!-- Right: Nav + Right Logo + Language + Menu -->
  <div class="flex items-center space-x-4">
    <!-- Desktop Nav Links -->
    <div class="hidden lg:flex space-x-4">
      <a mat-button routerLink="/about" routerLinkActive="active-link">About</a>
      <a mat-button routerLink="/team-members" routerLinkActive="active-link">Our Team</a>
      <a mat-button routerLink="/register" routerLinkActive="active-link">Register</a>
      <a mat-button routerLink="/feedback" routerLinkActive="active-link">Feedback</a>
    </div>

    <!-- Right Logo -->

    <!-- Language Selector -->
    <app-language-selector></app-language-selector>

    <!-- Mobile Hamburger -->
    <button [matMenuTriggerFor]="menu" class="lg:hidden">
      <mat-icon>menu</mat-icon>
    </button>
    <img src="assets/csi-mkd-logo.png" alt="CSI MKD Logo" class="h-10 sm:h-16 w-auto" />
  </div>
</mat-toolbar>

<!-- Mobile Nav Menu -->
<mat-menu #menu="matMenu">
  <a mat-menu-item routerLink="/about" routerLinkActive="active-link">About</a>
  <a mat-menu-item routerLink="/team-members" routerLinkActive="active-link">Our Team</a>
  <a mat-menu-item routerLink="/register" routerLinkActive="active-link">Register</a>
  <a mat-menu-item routerLink="/feedback" routerLinkActive="active-link">Feedback</a>
</mat-menu>

<router-outlet></router-outlet>
