<section class="py-10 px-6 bg-white">
  <div class="max-w-6xl mx-auto text-center">
    <h2 class="mb-6 text-2xl font-extrabold tracking-tight pt-serif-bold">Meet Our Team</h2>
    <p class="mb-12 max-w-2xl mx-auto text-gray-700 text-lg leading-relaxed pt-serif-regular">
      With a panel of certified counsellors, psychologists, and clergy dedicated to your holistic healing.
    </p>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
      @for (member of teamMembers(); track member) {
      <mat-card
        class="shadow-lg rounded-xl overflow-hidden hover:shadow-2xl transition-shadow duration-300"
        appAnimateOnScroll
      >
        <mat-card-header class="flex flex-col items-center text-center px-6 pt-6">
          <!-- <mat-card-title class="">{{ member.name }}</mat-card-title> -->
          <!-- <mat-card-subtitle class="text-gray-600 pb-5">{{ member.qualification }}</mat-card-subtitle> -->
          <mat-card-subtitle class="text-gray-600 pt-serif-bold">{{ member.name }}</mat-card-subtitle>

          <mat-card-content>
            <p class="text-gray-600 text-xs pt-serif-regular">
              {{ member.qualification }}
            </p>
          </mat-card-content>
        </mat-card-header>
        <!-- Optional: Add member photo or additional details here -->
      </mat-card>
      }
    </div>
  </div>
</section>
