<section class="py-30 px-6">
  <div class="max-w-6xl mx-auto">
    <!-- Heading -->
    <div class="cx-page-head text-center">
      <span class="cx-eyebrow"><i class="bi bi-people-fill"></i><span i18n>Our People</span></span>
      <h2 class="cx-h2 cx-gradient-text text-3xl sm:text-4xl mt-4 mb-3" i18n>Meet Our Team</h2>
      <p class="max-w-2xl mx-auto text-on-surface-variant text-base leading-relaxed" i18n>
        With a panel of certified counsellors, psychologists, and clergy dedicated to your holistic healing.
      </p>
      <hr class="cx-divider w-28 mx-auto mt-5" />
    </div>

    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-7 mt-12">
      @for (member of teamMembers(); track member) {
      <mat-card class="elegant-card cx-team-card" appAnimateOnScroll>
        <span class="cx-team-avatar" aria-hidden="true">{{ initialsFor(member.name) }}</span>
        <h3 class="cx-team-name">{{ member.name }}</h3>
        <p class="cx-team-qual">{{ member.qualification }}</p>
        <span class="cx-team-glow" aria-hidden="true"></span>
      </mat-card>
      }
    </div>
  </div>
</section>

<app-ad-banner adSlot="2222222222"></app-ad-banner>
