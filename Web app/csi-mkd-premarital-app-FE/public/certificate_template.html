<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>{{CERTIFICATE_TITLE}}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500&family=Cinzel:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Playfair Display', 'Trajan Pro', 'Times New Roman', serif;
      margin: 0;
      padding: 0;
      background-color: #fff;
    }

    .certificate-container {
      width: 1056px;
      height: 816px;
      background: #fff url('{{BACKGROUND_PATTERN_URL}}') no-repeat center;
      background-size: cover;
      border: 12px solid #b4975a;
      padding: 30px;
      margin: 0 auto;
      position: relative;
      box-sizing: border-box;
      text-align: center;
    }

    .header {
      margin-top: 40px;
    }

    .header .org-name {
      font-size: 36px;
      font-weight: bold;
      color: #7d2c2c;
      margin-top: 8px;
      font-family: 'Playfair Display', 'Trajan Pro', serif;
      letter-spacing: 1px;
    }

    .header .org-address {
      font-size: 18px;
      color: #2c1810;
      margin-top: 4px;
      font-weight: 400;
      font-family: 'Playfair Display', 'Times New Roman', serif;
      letter-spacing: 0.5px;
    }

    .certificate-title {
      font-size: 54px;
      font-weight: 700;
      color: #7d2c2c;
      margin-top: 40px;
      margin-bottom: 25px;
      text-transform: uppercase;
      font-family: 'Cinzel', 'Trajan Pro', 'Playfair Display', serif;
      letter-spacing: 3px;
      text-shadow: 1px 1px 2px rgba(125, 44, 44, 0.1);
    }

    .description {
      font-size: 26px;
      margin-top: 45px;
      color: #2c1810;
      font-weight: 500;
      font-family: 'Playfair Display', 'Times New Roman', serif;
      font-style: italic;
      letter-spacing: 0.5px;
    }

    .recipient-name {
      font-size: 48px;
      font-weight: 700;
      color: #004b2c;
      margin: 20px 0;
      display: inline-block;
      font-family: 'Playfair Display', 'Times New Roman', serif;
      letter-spacing: 1px;
      text-decoration-color: #b4975a;
      text-underline-offset: 8px;
    }

    .details {
      font-size: 24px;
      width: 80%;
      margin: 20px auto;
      line-height: 1.7;
      color: #2c1810;
      font-weight: 400;
      font-family: 'Playfair Display', 'Times New Roman', serif;
      letter-spacing: 0.3px;
    }

    .scripture {
      font-size: 16px;
      font-style: italic;
      margin: 25px auto;
      color: #2c1810;
      width: 80%;
      font-weight: 500;
    }

    .date {
      font-size: 18px;
      margin-top: 30px;
      color: #2c1810;
      font-weight: 600;
    }

    .signatures {
      display: flex;
      justify-content: space-between;
      position: absolute;
      bottom: 80px;
      width: 85%;
      left: 50%;
      transform: translateX(-50%);
    }

    .sign-box {
      text-align: center;
    }

    .sign-line {
      border-top: 1px solid #000;
      width: 220px;
      margin: 0 auto 5px auto;
    }

    .signature-name {
      font-weight: 600;
      font-size: 20px;
      color: #2c1810;
      font-family: 'Playfair Display', 'Times New Roman', serif;
      letter-spacing: 0.5px;
    }

    .signature-title {
      font-size: 16px;
      color: #2c1810;
      font-weight: 400;
      font-family: 'Playfair Display', 'Times New Roman', serif;
      font-style: italic;
      letter-spacing: 0.3px;
    }

    .logo {
      position: absolute;
      top: 60px;
      left: 30px;
      height: 100px;
    }
  </style>
</head>

<body>
  <div class="certificate-container">
    <img src="{{LOGO_URL}}" alt="Organization Logo" class="logo" style="display: {{LOGO_DISPLAY}};">
    <div class="header">
      <div class="org-name">{{ORGANIZATION_NAME}}</div>
      <div class="org-address">{{ORGANIZATION_ADDRESS}}</div>
    </div>

    <div class="certificate-title">{{CERTIFICATE_TITLE}}</div>

    <div class="description">This is to certify that</div>
    <div class="recipient-name">{{NAME}}</div>

    <div class="details">
      of {{CHURCH_NAME}} has attended {{PROGRAM_DURATION}} {{PROGRAM_NAME}} conducted at {{VENUE}} on {{DATES}}.
    </div>

    <div class="signatures">
      <div class="sign-box">
        <div class="signature-name">{{BISHOP_NAME}}</div>
        <div class="signature-title">{{BISHOP_TITLE}}</div>
      </div>
      <div class="sign-box">
        <div class="signature-name">{{DIRECTOR_NAME}}</div>
        <div class="signature-title">{{DIRECTOR_TITLE}}</div>
      </div>
    </div>
  </div>
</body>

</html>
